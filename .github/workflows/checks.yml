name: Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checker
        run: npm run check

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration tests (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: node

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            os: ubuntu-24.04
            alexandrite-asset: purescript-alexandrite-x86_64-unknown-linux-gnu.tar.gz
            alexandrite-executable: purescript-alexandrite
            test-command: xvfb-run -a npm run test:integration
          - platform: macOS
            os: macos-14
            alexandrite-asset: purescript-alexandrite-universal-apple-darwin.tar.gz
            alexandrite-executable: purescript-alexandrite
            test-command: npm run test:integration
          - platform: Windows
            os: windows-2022
            alexandrite-asset: purescript-alexandrite-x86_64-pc-windows-msvc.zip
            alexandrite-executable: purescript-alexandrite.exe
            test-command: npm run test:integration

    env:
      VSCODE_VERSION: 1.98.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve latest Alexandrite release
        id: alexandrite
        env:
          RELEASE_ASSET: ${{ matrix.alexandrite-asset }}
          RELEASE_REPOSITORY: purefunctor/purescript-alexandrite
          GH_TOKEN: ${{ github.token }}
        run: node scripts/resolve-latest-release-assets.mjs

      - name: Install Alexandrite
        env:
          RELEASE_ASSET: ${{ matrix.alexandrite-asset }}
          RELEASE_DIGEST: ${{ steps.alexandrite.outputs.digest }}
          RELEASE_EXECUTABLE: ${{ matrix.alexandrite-executable }}
          RELEASE_EXECUTABLE_ENVIRONMENT_VARIABLE: ALEXANDRITE_PATH
          RELEASE_REPOSITORY: purefunctor/purescript-alexandrite
          RELEASE_TAG: ${{ steps.alexandrite.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/install-release-asset.mjs

      - name: Cache VS Code test dependencies
        uses: actions/cache@v5
        with:
          path: |
            .vscode-test/vscode-*
            ~/.vscode/extensions/nwolverson.language-purescript-*
          key: vscode-test-${{ runner.os }}-${{ env.VSCODE_VERSION }}-language-purescript

      - name: Run integration tests
        run: ${{ matrix.test-command }}

  package:
    name: Package extension
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package

      - name: Prepare release assets
        run: node scripts/manage-release-assets.mjs prepare

      - name: Verify release assets
        run: node scripts/manage-release-assets.mjs verify

      - name: Upload packaged extension
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-${{ github.sha }}
          path: |
            release/*.vsix
            release/*.sha256
          if-no-files-found: error
