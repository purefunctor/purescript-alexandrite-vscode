name: Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  node:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checker
        run: npm run check

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: node

    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/purescript-analyzer
      VSCODE_VERSION: 1.98.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-bin: false
          prefix-key: purescript-analyzer

      - name: Resolve Alexandrite revision
        id: alexandrite
        run: |
          revision="$(git ls-remote https://github.com/purefunctor/purescript-alexandrite.git refs/heads/main | cut -f1)"
          test -n "$revision"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Cache Alexandrite binary
        id: alexandrite-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/purescript-analyzer
          key: purescript-analyzer-${{ runner.os }}-${{ steps.alexandrite.outputs.revision }}

      - name: Install Alexandrite
        if: steps.alexandrite-cache.outputs.cache-hit != 'true'
        run: |
          cargo install \
            --git https://github.com/purefunctor/purescript-alexandrite \
            --rev "${{ steps.alexandrite.outputs.revision }}" \
            --locked \
            purescript-analyzer

      - name: Configure Alexandrite path
        run: |
          test -x "$HOME/.cargo/bin/purescript-analyzer"
          echo "ALEXANDRITE_PATH=$HOME/.cargo/bin/purescript-analyzer" >> "$GITHUB_ENV"

      - name: Cache VS Code test dependencies
        uses: actions/cache@v5
        with:
          path: |
            .vscode-test/vscode-*
            ~/.vscode/extensions/nwolverson.language-purescript-*
          key: vscode-test-${{ runner.os }}-${{ env.VSCODE_VERSION }}-language-purescript

      - name: Run integration tests
        run: xvfb-run -a npm run test:integration
