name: Publish

on:
  release:
    types:
      - published

permissions: {}

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.14
  NODE_VERSION: 22

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-24.04

    permissions:
      actions: read
      contents: read

    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      package_version: ${{ steps.validate.outputs.package_version }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Validate release metadata
        id: validate
        env:
          CHECKS_WORKFLOW: checks.yml
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bun scripts/validate-release.mjs

  package:
    name: Package extension
    runs-on: ubuntu-24.04
    needs: validate

    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package

      - name: Prepare release artifact
        run: bun scripts/manage-release-assets.mjs prepare

      - name: Attest VSIX provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: release/*.vsix

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vscode-extension-${{ needs.validate.outputs.release_tag }}
          path: |
            release/*.vsix
            release/*.sha256
          if-no-files-found: error
          retention-days: 7

  upload_release_assets:
    name: Attach release assets
    runs-on: ubuntu-24.04
    needs:
      - validate
      - package

    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download workflow artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vscode-extension-${{ needs.validate.outputs.release_tag }}
          path: release

      - name: Attach assets to release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
        run: bun scripts/manage-release-assets.mjs upload

  publish_marketplace:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-24.04
    needs:
      - validate
      - upload_release_assets
    environment: visual-studio-marketplace

    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install publishing toolchain
        run: npm ci --ignore-scripts

      - name: Download workflow artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vscode-extension-${{ needs.validate.outputs.release_tag }}
          path: release

      - name: Verify release artifact
        run: bun scripts/manage-release-assets.mjs verify

      - name: Publish VSIX
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: bun scripts/publish-vsix-package.mjs
